<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f1117">
  <title>WITS</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon.svg">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <button id="menu-btn" class="icon-btn" title="Panels">☰</button>
    <div class="title">
      <span class="logo">◆</span>
      <span class="title-text">WITS</span>
      <span id="status-dot" class="dot" title="checking…"></span>
    </div>
    <div class="header-actions">
      <a id="header-settings-link" class="icon-btn" href="/settings" title="System settings">🎛</a>
      <button id="export-btn" class="icon-btn" title="Export chat to file">⬇</button>
      <button id="new-chat-btn" class="icon-btn" title="New chat">＋</button>
    </div>
  </header>

  <main id="chat"></main>

  <form id="composer">
    <textarea id="input" rows="1" placeholder="Ask WITS anything…" autocomplete="off"></textarea>
    <button id="send-btn" type="submit" title="Send">➤</button>
  </form>

  <!-- slide-over side panel -->
  <div id="panel-backdrop" hidden></div>
  <aside id="panel" hidden>
    <div class="panel-header">
      <h2 id="panel-title">Side panel</h2>
      <a id="settings-link" href="/settings" title="System settings">🎛</a>
      <button id="panel-close">✕</button>
    </div>
    <nav class="panel-tabs">
      <button data-tab="tools" class="active">Tools</button>
      <button data-tab="memory">Memory</button>
      <button data-tab="docs">Documents</button>
    </nav>
    <section id="tab-tools" class="tab active"></section>
    <section id="tab-memory" class="tab">
      <div class="row">
        <input id="memory-q" type="search" placeholder="Search memory…">
        <button id="memory-go">Go</button>
      </div>
      <div id="memory-results"></div>

      <hr class="panel-sep">

      <div class="mem-section-title">Recent memory</div>
      <div class="row">
        <input id="memory-recent-type" list="mem-types" type="text" placeholder="Type filter… (optional)">
        <input id="memory-recent-source" type="text" placeholder="Source filter… (optional)">
      </div>
      <div class="row">
        <input id="memory-recent-limit" type="number" min="1" max="100" value="20" title="Page size">
        <button id="memory-recent-go">Load</button>
      </div>
      <div id="memory-recent-results"></div>
      <div class="mem-pager">
        <button id="memory-recent-prev" disabled>‹ Prev</button>
        <span id="memory-recent-pageinfo" class="mem-pageinfo">—</span>
        <button id="memory-recent-next" disabled>Next ›</button>
      </div>

      <hr class="panel-sep">

      <div class="mem-section-title mem-danger-title">Prune (delete)</div>
      <div class="row">
        <input id="memory-prune-type" list="mem-types" type="text" placeholder="Type (optional)">
        <input id="memory-prune-source" type="text" placeholder="Source (optional)">
      </div>
      <div class="row">
        <input id="memory-prune-confirm" type="text" placeholder="Type PRUNE to confirm">
        <button id="memory-prune-go" class="danger-btn">Prune</button>
      </div>
      <div id="memory-prune-status" class="mem-prune-status"></div>

      <datalist id="mem-types">
        <option value="conversation"></option>
        <option value="user_input"></option>
        <option value="agent_response"></option>
        <option value="thinking"></option>
        <option value="goal_defined"></option>
        <option value="tool_output"></option>
        <option value="observation"></option>
        <option value="result"></option>
      </datalist>
    </section>
    <section id="tab-docs" class="tab">
      <label class="upload-btn">
        Upload document
        <input id="doc-file" type="file" hidden>
      </label>
      <div id="doc-list"></div>
    </section>
    <div class="panel-links">
      <a href="/settings">🎛 System settings</a>
      <a href="/personality">🎭 Personality</a>
      <a href="/mcp">🧩 MCP servers</a>
    </div>
  </aside>

  <!-- token prompt -->
  <div id="token-modal" hidden>
    <div class="modal-card">
      <h2>Access token</h2>
      <p>Enter the WITSV3_WEB_TOKEN from your .env file.</p>
      <form id="token-form">
        <input id="token-input" type="password" placeholder="token" autocomplete="off">
        <p id="token-error" class="modal-error" hidden></p>
        <button id="token-save" type="submit">Connect</button>
      </form>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
