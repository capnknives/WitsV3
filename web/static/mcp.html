<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f1117">
  <title>WITS — MCP Servers</title>
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/style.css">
  <style>
    body { display: block; overflow: auto; }
    .wrap { max-width: 680px; margin: 0 auto; padding: 18px 16px 60px; }
    .wrap header { position: static; display: flex; align-items: center; gap: 10px;
                   padding: 0 0 6px; background: none; border: none; }
    .wrap header a { color: var(--fg-dim); text-decoration: none; font-size: 14px; }
    .wrap header a:hover { color: var(--fg); }
    h1 { font-size: 20px; margin: 0; }
    p.lead { color: var(--fg-dim); font-size: 14px; margin: 6px 0 20px; }
    .server { background: var(--bg-2); border: 1px solid #2c3245; border-radius: var(--radius);
              padding: 14px 16px; margin-bottom: 12px; }
    .server-head { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .server-name { font-weight: 600; word-break: break-all; flex: 1; min-width: 200px; }
    .chip { font-size: 12px; border-radius: 999px; padding: 3px 10px; white-space: nowrap; }
    .chip.on  { background: rgba(61,220,151,.15); color: var(--accent-2); }
    .chip.off { background: var(--bg-3); color: var(--fg-dim); }
    .server .cmd { color: var(--fg-dim); font-size: 12.5px; font-family: ui-monospace, monospace;
                   margin-top: 6px; word-break: break-all; }
    .server-actions { display: flex; gap: 8px; margin-top: 10px; }
    .server-actions button {
      background: var(--bg-3); border: 1px solid #2c3245; color: var(--fg);
      border-radius: 8px; padding: 7px 14px; font: inherit; font-size: 13.5px; cursor: pointer;
    }
    .server-actions button.primary { background: var(--accent); border: none; color: #fff; }
    .server-actions button:disabled { opacity: .5; cursor: wait; }
    .tools { margin-top: 10px; border-top: 1px solid #232838; padding-top: 8px; }
    .tools .tool { padding: 6px 0; border-bottom: 1px solid #232838; }
    .tools .tool b { color: var(--accent); font-size: 13.5px; }
    .tools .tool p { color: var(--fg-dim); font-size: 12.5px; margin: 2px 0 0; }
    h2 { font-size: 15px; margin: 28px 0 10px; color: var(--fg-dim);
         text-transform: uppercase; letter-spacing: 1px; }
    #add-form { background: var(--bg-2); border: 1px solid #2c3245; border-radius: var(--radius);
                padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    #add-form label { font-weight: 600; font-size: 14px; }
    #add-form input {
      width: 100%; box-sizing: border-box; background: var(--bg-3); border: 1px solid #2c3245;
      color: var(--fg); border-radius: 8px; padding: 10px 12px; font: inherit;
    }
    #add-form .hint { color: var(--fg-dim); font-size: 12.5px; margin-top: -6px; }
    #add-btn { background: var(--accent); border: none; color: #fff; border-radius: 8px;
               padding: 11px; font: inherit; cursor: pointer; }
    #status { margin-top: 12px; font-size: 14px; }
    #status.ok { color: #7dd68a; }
    #status.bad { color: #ff8f8f; }
  </style>
</head>
<body>
  <div class="wrap">
    <header><a href="/">← back to chat</a></header>
    <h1>◆ MCP Servers</h1>
    <p class="lead">
      MCP servers give WITS extra tools (filesystem, memory, APIs…). Connecting a server
      starts its command locally and registers its tools with WITS immediately.
    </p>

    <div id="server-list"></div>

    <h2>Add a server</h2>
    <form id="add-form">
      <label for="add-name">Name</label>
      <input id="add-name" placeholder="e.g. memory" autocomplete="off">
      <label for="add-command">Command</label>
      <input id="add-command" placeholder="e.g. npx -y @modelcontextprotocol/server-memory" autocomplete="off">
      <div class="hint">The stdio command that starts the server. Runs on this PC.</div>
      <label for="add-cwd">Working directory (optional)</label>
      <input id="add-cwd" placeholder="e.g. C:\Users\capta\source\repos\my-mcp" autocomplete="off">
      <button id="add-btn" type="submit">Add server</button>
    </form>
    <div id="status"></div>
  </div>

  <script>
    "use strict";
    const $ = (sel) => document.querySelector(sel);
    const token = localStorage.getItem("wits_token") || "";

    function setStatus(msg, ok) {
      const s = $("#status");
      s.textContent = msg;
      s.className = ok ? "ok" : "bad";
    }

    async function api(path, opts = {}) {
      const headers = { ...(opts.headers || {}) };
      if (token) headers["Authorization"] = `Bearer ${token}`;
      const res = await fetch(path, { ...opts, headers });
      if (res.status === 401) {
        setStatus("Not logged in — open the chat page first and enter your token.", false);
        throw new Error("unauthorized");
      }
      return res;
    }

    function el(tag, cls, text) {
      const node = document.createElement(tag);
      if (cls) node.className = cls;
      if (text !== undefined) node.textContent = text;
      return node;
    }

    async function showTools(card, name) {
      const existing = card.querySelector(".tools");
      if (existing) { existing.remove(); return; }
      const res = await api(`/api/mcp/servers/${encodeURIComponent(name)}/tools`);
      if (!res.ok) { setStatus("Could not list tools — is the server connected?", false); return; }
      const { tools } = await res.json();
      const box = el("div", "tools");
      if (!tools.length) box.appendChild(el("div", "tool", "No tools reported."));
      for (const t of tools) {
        const item = el("div", "tool");
        item.appendChild(el("b", null, t.name));
        item.appendChild(el("p", null, t.description || ""));
        box.appendChild(item);
      }
      card.appendChild(box);
    }

    async function connect(btn, name) {
      btn.disabled = true;
      btn.textContent = "Connecting…";
      setStatus(`Starting ${name}…`, true);
      try {
        const res = await api(`/api/mcp/servers/${encodeURIComponent(name)}/connect`, { method: "POST" });
        const body = await res.json().catch(() => ({}));
        if (res.ok) {
          setStatus(`✅ Connected — ${body.tools.length} tools registered with WITS.`, true);
          await load();
        } else {
          setStatus(`Connect failed: ${body.detail || res.status}`, false);
          btn.disabled = false;
          btn.textContent = "Connect";
        }
      } catch (e) {
        if (e.message !== "unauthorized") setStatus(`Connect failed: ${e.message}`, false);
        btn.disabled = false;
        btn.textContent = "Connect";
      }
    }

    async function removeServer(name) {
      if (!confirm(`Remove MCP server "${name}" from the config?`)) return;
      const res = await api(`/api/mcp/servers/${encodeURIComponent(name)}`, { method: "DELETE" });
      if (res.ok) { setStatus("Removed.", true); await load(); }
      else setStatus("Remove failed.", false);
    }

    async function load() {
      try {
        const res = await api("/api/mcp/servers");
        const { servers } = await res.json();
        const list = $("#server-list");
        list.innerHTML = "";
        if (!servers.length) list.appendChild(el("p", "lead", "No MCP servers configured yet — add one below."));
        for (const s of servers) {
          const card = el("div", "server");
          const head = el("div", "server-head");
          head.appendChild(el("div", "server-name", s.name));
          head.appendChild(el("span", `chip ${s.connected ? "on" : "off"}`,
            s.connected ? `connected · ${s.tool_count} tools` : "not connected"));
          card.appendChild(head);
          const cmd = Array.isArray(s.command) ? s.command.join(" ") : (s.command || "");
          card.appendChild(el("div", "cmd", cmd + (s.working_directory ? `  (in ${s.working_directory})` : "")));

          const actions = el("div", "server-actions");
          if (s.connected) {
            const toolsBtn = el("button", null, "Browse tools");
            toolsBtn.addEventListener("click", (e) => { e.preventDefault(); showTools(card, s.name); });
            actions.appendChild(toolsBtn);
          } else {
            const connectBtn = el("button", "primary", "Connect");
            connectBtn.addEventListener("click", (e) => { e.preventDefault(); connect(connectBtn, s.name); });
            actions.appendChild(connectBtn);
          }
          const removeBtn = el("button", null, "Remove");
          removeBtn.addEventListener("click", (e) => { e.preventDefault(); removeServer(s.name); });
          actions.appendChild(removeBtn);
          card.appendChild(actions);
          list.appendChild(card);
        }
      } catch (e) { /* handled */ }
    }

    $("#add-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const name = $("#add-name").value.trim();
      const command = $("#add-command").value.trim();
      if (!name || !command) { setStatus("Name and command are required.", false); return; }
      const body = { name, command };
      const cwd = $("#add-cwd").value.trim();
      if (cwd) body.working_directory = cwd;
      const res = await api("/api/mcp/servers", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await res.json().catch(() => ({}));
      if (res.ok) {
        setStatus(`✅ Added "${name}" — hit Connect to start it.`, true);
        $("#add-form").reset();
        await load();
      } else {
        setStatus(`Add failed: ${data.detail || res.status}`, false);
      }
    });

    load();
  </script>
</body>
</html>
