name: CI

on:
  push:
    branches: [main, fix/revive-2026-07]
  pull_request:
    branches: [main, fix/revive-2026-07]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install -e .

      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Runtime layout operator check
        run: |
          python -c "
          from core.runtime_paths import SUBDIRS, ensure_runtime_layout, project_root
          ensure_runtime_layout('var')
          root = project_root()
          for sub in SUBDIRS:
              assert (root / 'var' / sub).is_dir(), f'missing var/{sub}'
          for legacy in (*SUBDIRS, 'documents'):
              assert not (root / legacy).exists(), f'legacy {legacy}/ at repo root'
          print('op-runtime-layout OK')
          "

      - name: Upload coverage
        if: matrix.python-version == '3.10'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            coverage_html/

  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install ruff and black
        run: python -m pip install --upgrade pip ruff black

      # Full project lint matches pyproject.toml + local pre-commit (ruff E/F/W/I/UP/B, black).
      - name: Ruff
        run: ruff check agents core tools web tests

      - name: Black
        run: black --check agents core tools web tests
