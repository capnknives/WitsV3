agents:
  default_temperature: 0.7
  max_iterations: 15
  book_writing_agent:
    # hermes3:8b — narrative coherence; pull via Settings or `ollama pull hermes3:8b`
    model: hermes3:8b
    max_tokens: 4500
    num_ctx: 8192
    temperature: 0.8
auto_restart_on_file_change: false
cli:
  show_thoughts: true
  show_tool_calls: true
debug_mode: false
web_ui:
  enabled: true
  host: 0.0.0.0   # reachable from other devices on your network (e.g. your phone)
  port: 8000
  require_auth: true  # token comes from WITSV3_WEB_TOKEN in .env
  owner_display_name: Richard  # aka Andy; override with WITSV3_OWNER_NAME in .env
  auto_reload: true  # watch source (agents/core/tools/web/config.yaml) and restart on change
  guest_access:
    enabled: true  # set true + WITSV3_GUEST_INVITE in .env for family testers
    allow_lan_only: true
    token_ttl_hours: 720
    max_message_rate_per_minute: 20
    allow_document_search: false
    audit_chat: true
    content_policy_enabled: true
    default_guest_age_band: teen
    adult_allow_document_search: true
document_rag:
  enabled: true
  documents_path: var/documents
  chunk_size: 1200
  chunk_overlap: 150
  auto_ingest_on_startup: true
  file_extensions:
    - .txt
    - .md
    - .markdown
    - .py
    - .json
    - .csv
    - .html
    - .log
    - .pdf
web_search:
  # Provider fallback chain gives real web results with NO API key (DuckDuckGo).
  # Add a key in .env for much better quality:
  #   TAVILY_API_KEY        (tavily.com — 1000 free searches/mo, LLM-optimized)
  #   BRAVE_SEARCH_API_KEY  (brave.com/search/api — 2000 free/mo)
  provider: auto        # auto | tavily | brave | duckduckgo
  max_results: 5
  tavily_search_depth: advanced  # advanced (more accurate, 2 credits) | basic (1 credit)
  timeout_seconds: 12
  region: wt-wt         # DuckDuckGo region (wt-wt = no region)
  safesearch: moderate  # off | moderate | strict
self_repair:
  # Diagnose-and-fix is verified before anything is committed: tests must
  # pass, or the edit is reverted to the exact original bytes. See
  # core/safe_code_editor.py.
  enabled: true
  daily_schedule_enabled: true
  daily_schedule_cron: "0 3 * * *"  # 3am daily
  max_issues_per_run: 3
  log_scan_lines: 2000
  restart_after_fix: false  # keep off by default so a scheduled repair never surprises an active session
  test_timeout_seconds: 120
knowledge_log:
  # Cross-session aggregation of recurring errors (fed by self_repair's log
  # scan) and durable project facts. See core/knowledge_log.py.
  file_path: data/knowledge_log.json
  max_error_signatures: 200
  max_facts: 200
escalation:
  enabled: true
  model: claude-opus-4-8
  max_tokens: 2048
llm_interface:
  default_provider: ollama
  streaming_enabled: true
  timeout_seconds: 120
logging_level: INFO
memory_manager:
  backend: basic
  faiss_index_path: var/data/wits_faiss_index.bin
  max_memory_segments: 10000
  max_results_per_search: 5
  memory_file_path: var/data/wits_memory.json
  neural_web_path: var/data/neural_web.json
  neural_web_settings:
    activation_threshold: 0.3
    auto_connect: true
    connection_strength_threshold: 0.2
    decay_rate: 0.1
    max_concept_connections: 50
    reasoning_patterns:
      - modus_ponens
      - analogy
      - chain
      - contradiction
  pruning_interval_seconds: 3600
  vector_dim: 768  # nomic-embed-text embedding dimension
ollama_settings:
  control_center_model: qwen3:8b
  default_model: qwen3:8b
  embedding_model: nomic-embed-text
  orchestrator_model: qwen3:8b
  url: http://localhost:11434

  # Model reliability and fallback settings
  fallback_models:
    - qwen3:8b
    - qwen2.5-coder:7b
  enable_model_fallback: true
  model_failure_threshold: 3
  model_timeout: 300
  health_check_interval: 60
  enable_health_monitoring: true
  quarantine_duration: 300
model_routing:
  enabled: false
  trivial_model: qwen3:8b
  code_model: qwen2.5-coder:7b
  complex_model: qwen3:8b
  trivial_max_chars: 140
routing:
  slim_intent_prompt: true
  intent_history_turns: 5
  greeting_only_direct: true
  enable_meta_reasoning_intent: false
personality:
  allow_runtime_switching: false
  enabled: true
  profile_id: richard_elliot_wits
  profile_path: config/wits_personality.yaml
project_name: WitsV3
security:
  # Set via WITSV3_AUTH_TOKEN_HASH in .env (never commit secrets here)
  auth_token_hash: ""
  authorized_network_override_user: richard_elliot
  ethics_override_authorized_user: richard_elliot
  ethics_system_enabled: true
  python_execution_network_access: false
  python_execution_subprocess_access: false
  require_auth_for_ethics_override: true
  require_auth_for_network_control: true
supabase:
  enable_realtime: true
  # Set via WITSV3_SUPABASE_URL / WITSV3_SUPABASE_KEY in .env (never commit secrets here)
  key: ""
  url: ""
tool_system:
  enable_mcp_tools: true
  mcp_connect_on_startup: false  # external MCP node servers aren't built locally; skip slow boot attempts
  mcp_tool_definitions_path: var/data/mcp_tools.json
version: 3.0.0
