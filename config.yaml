adaptive_llm:
  complexity_analyzer:
    length_weight: 0.2
    reasoning_weight: 0.3
    structure_weight: 0.2
    use_embeddings: true
    vocab_weight: 0.3
  enable_performance_tracking: true
  fallback_to_base_on_error: true
  max_fallback_attempts: 3
  module_loader:
    enable_quantization: true
    preload_modules:
      - base
    ram_budget_gb: 30.0
    vram_budget_gb: 7.5
  semantic_cache:
    cache_dir: cache
    cache_size: 1000000
    enable_caching: true
    similarity_threshold: 0.92
agents:
  book_writing_agent:
    enable_narrative_intelligence: true
    max_tokens: 16384
    model: qwen3:8b
    story_structure_patterns:
      - hero_journey
      - three_act
      - spiral
    temperature: 0.8
  coding_agent:
    enable_code_intelligence: true
    max_tokens: 8192
    model: qwen2.5-coder:7b
    supported_languages:
      - python
      - javascript
      - typescript
      - rust
      - go
    temperature: 0.2
  control_center_agent:
    enable_neural_routing: true
    max_tokens: 2048
    model: qwen3:8b
    temperature: 0.3
  default_temperature: 0.7
  max_iterations: 15
  orchestrator_agent:
    enable_neural_reasoning: true
    max_tokens: 4096
    model: qwen3:8b
    reasoning_depth: 3
    temperature: 0.7
  self_repair_agent:
    enable_system_monitoring: true
    health_check_interval: 300
    max_tokens: 4096
    model: qwen3:8b
    temperature: 0.1
auto_restart_on_file_change: false
cli:
  show_thoughts: true
  show_tool_calls: true
debug_mode: false
web_ui:
  enabled: true
  host: 0.0.0.0   # reachable from other devices on your network (e.g. your phone)
  port: 8000
  require_auth: true  # token comes from WITSV3_WEB_TOKEN in .env
  owner_display_name: Owner  # override with WITSV3_OWNER_NAME=Sean in .env for access logs
  guest_access:
    enabled: true  # set true + WITSV3_GUEST_INVITE in .env for family testers
    allow_lan_only: true
    token_ttl_hours: 720
    max_message_rate_per_minute: 20
    allow_document_search: false
    audit_chat: true
    content_policy_enabled: true
document_rag:
  enabled: true
  documents_path: documents
  chunk_size: 1200
  chunk_overlap: 150
  auto_ingest_on_startup: true
  file_extensions:
    - .txt
    - .md
    - .markdown
    - .py
    - .json
    - .csv
    - .html
    - .log
    - .pdf
web_search:
  # Provider fallback chain gives real web results with NO API key (DuckDuckGo).
  # Add a key in .env for much better quality:
  #   TAVILY_API_KEY        (tavily.com — 1000 free searches/mo, LLM-optimized)
  #   BRAVE_SEARCH_API_KEY  (brave.com/search/api — 2000 free/mo)
  provider: auto        # auto | tavily | brave | duckduckgo
  max_results: 5
  tavily_search_depth: advanced  # advanced (more accurate, 2 credits) | basic (1 credit)
  timeout_seconds: 12
  region: wt-wt         # DuckDuckGo region (wt-wt = no region)
  safesearch: moderate  # off | moderate | strict
self_repair:
  # Diagnose-and-fix is verified before anything is committed: tests must
  # pass, or the edit is reverted to the exact original bytes. See
  # core/safe_code_editor.py.
  enabled: true
  daily_schedule_enabled: true
  daily_schedule_cron: "0 3 * * *"  # 3am daily
  max_issues_per_run: 3
  log_scan_lines: 2000
  restart_after_fix: false  # keep off by default so a scheduled repair never surprises an active session
  test_timeout_seconds: 120
docker:
  background_agents:
    cpu_limit: "1.0"
    health_check_interval: 30
    max_instances: 3
    memory_limit: 2G
    network_mode: bridge
    restart_policy: unless-stopped
  enabled: true
  environment:
    CURSOR_INTEGRATION: "true"
    OLLAMA_HOST: host.docker.internal
    OLLAMA_PORT: "11434"
    WITSV3_BACKGROUND_MODE: "true"
    WITSV3_DOCKER_ENV: "true"
  volumes:
    - source: ./data
      target: /app/data
    - source: ./config.yaml
      target: /app/config.yaml
llm_interface:
  default_provider: ollama
  streaming_enabled: true
  timeout_seconds: 120
logging_level: INFO
memory_manager:
  backend: basic
  faiss_index_path: data/wits_faiss_index.bin
  max_memory_segments: 10000
  max_results_per_search: 5
  memory_file_path: data/wits_memory.json
  neural_web_path: data/neural_web.json
  neural_web_settings:
    activation_threshold: 0.3
    auto_connect: true
    connection_strength_threshold: 0.2
    decay_rate: 0.1
    max_concept_connections: 50
    reasoning_patterns:
      - modus_ponens
      - analogy
      - chain
      - contradiction
  pruning_interval_seconds: 3600
  vector_dim: 768  # nomic-embed-text embedding dimension
ollama_settings:
  book_writing_model: qwen3:8b
  coding_agent_model: qwen2.5-coder:7b
  control_center_model: qwen3:8b
  default_model: qwen3:8b
  embedding_model: nomic-embed-text
  neural_reasoning_model: qwen3:8b
  orchestrator_model: qwen3:8b
  request_timeout: 120
  self_repair_model: qwen3:8b
  url: http://localhost:11434

  # Model reliability and fallback settings
  fallback_models:
    - qwen3:8b
    - llama3.2:3b
    - qwen2.5-coder:7b
  enable_model_fallback: true
  model_failure_threshold: 3
  model_timeout: 300
  health_check_interval: 60
  enable_health_monitoring: true
  quarantine_duration: 300
personality:
  allow_runtime_switching: false
  enabled: true
  profile_id: richard_elliot_wits
  profile_path: config/wits_personality.yaml
project_name: WitsV3
security:
  # Set via WITSV3_AUTH_TOKEN_HASH in .env (never commit secrets here)
  auth_token_hash: ""
  authorized_network_override_user: richard_elliot
  ethics_override_authorized_user: richard_elliot
  ethics_system_enabled: true
  python_execution_network_access: false
  python_execution_subprocess_access: false
  require_auth_for_ethics_override: true
  require_auth_for_network_control: true
supabase:
  enable_realtime: true
  # Set via WITSV3_SUPABASE_URL / WITSV3_SUPABASE_KEY in .env (never commit secrets here)
  key: ""
  url: ""
tool_system:
  enable_mcp_tools: true
  mcp_connect_on_startup: false  # external MCP node servers aren't built locally; skip slow boot attempts
  mcp_tool_definitions_path: data/mcp_tools.json
version: 3.0.0
