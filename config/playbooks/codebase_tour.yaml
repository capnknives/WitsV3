id: codebase_tour
description: Bootstrap codebase overview via filesystem reads.
triggers:
  signals:
    - your codebase
    - about your code
    - look at your own files
    - tell me about yourself
steps:
  - tool: list_directory
    args:
      directory_path: "."
  - tool: read_file
    args:
      file_path: README.md
  - tool: read_file
    args:
      file_path: AGENTS.md
synthesis: "Here is an overview of the WitsV3 codebase based on the project files I read."
